name: chaos-e2e

on:
  workflow_dispatch:
  schedule:
    # Weekly run on the default branch so this otherwise dispatch-only job
    # cannot silently rot (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: chaos-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  chaos-e2e:
    name: chaos-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install MKVToolNix
        run: |
          sudo apt-get update
          sudo apt-get install -y mkvtoolnix

      - name: Install ffmpeg 7
        # BtbN ships only rolling builds: dated autobuild-* tags are
        # garbage-collected (a pinned URL 404s within weeks) and the `latest`
        # tag's bytes change on every rebuild (a pinned SHA256 can never match
        # for long). Track the rolling n7.1 `latest` asset for a stable URL over
        # HTTPS-authenticated transport, and assert the major.minor version at
        # runtime in place of a digest that cannot track a moving target.
        env:
          FFMPEG_ARCHIVE_URL: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linux64-gpl-7.1.tar.xz
        run: |
          archive="$RUNNER_TEMP/ffmpeg.tar.xz"
          install_dir="$RUNNER_TEMP/ffmpeg"
          curl -fL "$FFMPEG_ARCHIVE_URL" -o "$archive"
          mkdir -p "$install_dir"
          tar -xJf "$archive" -C "$install_dir" --strip-components=1
          echo "$install_dir/bin" >> "$GITHUB_PATH"
          installed_version="$("$install_dir/bin/ffmpeg" -version | head -n1)"
          echo "Installed: $installed_version"
          if ! printf '%s\n' "$installed_version" | grep -Eq 'version n?7\.1[ .-]'; then
            echo "::error::expected ffmpeg 7.1.x, got: $installed_version"
            exit 1
          fi

      - name: Verify external tools
        run: |
          uv --version
          uv python install 3.13
          uv run --python 3.13 python --version
          ffmpeg -version
          ffprobe -version
          mkvmerge --version

      - name: Run Chaos Librarian E2E
        run: just chaos-e2e-ci

  notify-failure:
    name: notify failure
    needs: chaos-e2e
    # Only on scheduled runs: a manual dispatch already shows its result to
    # the operator who triggered it.
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Scheduled chaos-e2e run failed" \
            --body "The weekly scheduled chaos-e2e workflow failed. Run: $RUN_URL"
