name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Install cargo-deny + cargo-audit
        run: cargo install --locked cargo-deny cargo-audit

      - name: Install ast-grep
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c  # v2.78.2
        with:
          tool: ast-grep

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: just ci
        run: just ci

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Skip on fork PRs: GitHub does not expose secrets to fork workflows.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # SonarCloud uses git history for blame.

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c  # v2.78.2
        with:
          tool: cargo-llvm-cov

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate lcov
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info -- --test-threads=1

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432  # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
