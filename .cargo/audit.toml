[advisories]
# RUSTSEC-2023-0071 — Marvin Attack in `rsa`.
#
# `cargo audit` reads Cargo.lock and flags every crate listed there,
# including optional/feature-disabled transitive deps that aren't actually
# linked into the binary. `cargo tree -i rsa` and `cargo deny check
# advisories` both confirm `rsa` is NOT in the resolved feature graph:
# voom-store enables only sqlx's `runtime-tokio`, `sqlite`, `migrate`, and
# `time` features, so the `sqlx-macros` / `sqlx-macros-core` /
# `sqlx-mysql` chain that pulls `rsa` is dead at the link layer.
#
# We don't currently have a way to prune lockfile-only entries that cargo
# never compiles. Until cargo-audit grows feature-resolved scanning or sqlx
# decouples its backend crates, keep this ignore narrow and document that
# `cargo deny` is the authoritative advisory check in CI.
ignore = ["RUSTSEC-2023-0071"]
informational_warnings = ["unmaintained", "notice"]
severity_threshold = "low"
