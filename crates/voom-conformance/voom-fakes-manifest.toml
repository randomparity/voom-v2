[[binaries]]
name = "fake-issue-provider"
target = "fake-issue-provider"
purpose = "phase 6 issue fake - deterministic commit reports"
status = "active"
required = true

[[binaries.operations]]
operation = "commit_artifact"
valid_payload = { path = "/library/movie.mkv", reason = "quality_regression", scenario = "default" }
invalid_payload = { path = "/library/movie.mkv", reason = "unknown" }

[[binaries]]
name = "fake-use-lease-provider"
target = "fake-use-lease-provider"
purpose = "phase 6 use-lease fake - deterministic edit-track lease reports"
status = "active"
required = true

[[binaries.operations]]
operation = "edit_tracks"
valid_payload = { path = "/library/movie.mkv", holder = "manual", reason = "playback", scenario = "default" }
invalid_payload = { path = "/library/movie.mkv", holder = "manual", reason = "unknown" }

[scaffold]
binaries = []
