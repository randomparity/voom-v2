# Conformance harness manifest — Sprint 2 Phase 6 scaffold.
#
# Lists worker binaries the conformance suite runs against. Binaries
# in [scaffold] are placeholders (Phase 3 / 4 / 5 stubs) and are
# skipped until their real implementations land.
#
# `voom-conformance::Harness` will consume this file in a follow-up
# commit to gate Phase 3 / 4 / 5 / 6 follow-up work.

[[binaries]]
name = "echo-worker"
target = "echo-worker"
purpose = "bootstrap conformance - validates the harness against itself"
status = "active"
required = true

[[binaries]]
name = "chaos-worker"
target = "chaos-worker"
purpose = "phase 4 chaos worker - baseline conformance and process-backed fault modes"
status = "active"
required = true

[[binaries]]
name = "benchmark-worker"
target = "benchmark-worker"
purpose = "phase 5 benchmark worker - baseline conformance and bounded worker-level metric frames"
status = "active"
required = true

[scaffold]
binaries = [
    "fake-scanner",
    "fake-prober",
    "fake-transcoder",
    "fake-remuxer",
    "fake-backup-store",
    "fake-health-checker",
    "fake-identity-provider",
    "fake-external-system",
    "fake-quality-scorer",
    "fake-issue-provider",
    "fake-use-lease-provider",
]
