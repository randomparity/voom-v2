[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
unused-allowed-license = "deny"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
    # sqlx-core pulls hashlink (hashbrown 0.15) and indexmap (hashbrown 0.17)
    # simultaneously; the 0.15 → 0.17 API break prevents unification until
    # upstream realigns. Revisit on sqlx bumps.
    { crate = "hashbrown", reason = "transitive duplication via sqlx-core" },
    # `directories` (transitively via redox_users → dirs-sys) pulls
    # `getrandom 0.2`, while `rand 0.9 → rand_core` pulls `getrandom 0.3`.
    # Both upstreams have not yet realigned; the duplication is two thin
    # OS-randomness wrappers, not a security exposure. Revisit when
    # `directories` bumps its `dirs-sys` dep.
    { crate = "getrandom", reason = "transitive duplication: directories@6 still on getrandom 0.2, rand@0.9 on 0.3" },
    # sqlx-core's sha2 stack still on cpufeatures 0.2 while blake3 (Sprint 2
    # idempotency replay hash) pulls 0.3. Both are thin CPU-feature probes;
    # no behavior risk. Revisit on sqlx bump.
    { crate = "cpufeatures", reason = "transitive duplication: sqlx@0.8 still on cpufeatures 0.2, blake3@1 on 0.3" },
    # voom crates use constant_time_eq 0.5 for constant-time comparisons while
    # blake3@1.8 still pins 0.4. Both are thin constant-time-equality helpers;
    # no behavior risk. Revisit when blake3 moves to constant_time_eq 0.5.
    { crate = "constant_time_eq", reason = "transitive duplication: blake3@1.8 pins 0.4, voom crates on 0.5" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
