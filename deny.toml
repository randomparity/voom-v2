[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = [
    # sqlx-core pulls hashlink (hashbrown 0.15) and indexmap (hashbrown 0.17)
    # simultaneously; the 0.15 → 0.17 API break prevents unification until
    # upstream realigns. Revisit on sqlx bumps.
    { crate = "hashbrown", reason = "transitive duplication via sqlx-core" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
