[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2023-0071 — Marvin Attack in `rsa` crate (no upstream fix). Pulled
# transitively via sqlx-macros-core, which hard-depends on sqlx-mysql,
# sqlx-postgres, and sqlx-sqlite regardless of which backend features we
# enable. We only use SQLite, so the vulnerable MySQL code path is never
# exercised at runtime. Re-evaluate when sqlx ships a fix that decouples
# backends or when `rsa` releases a constant-time implementation. Mirrors
# the same ignore in `.cargo/audit.toml`.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
