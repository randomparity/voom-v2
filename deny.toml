[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
unused-allowed-license = "deny"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
    # sqlx-core pulls hashlink (hashbrown 0.15) and indexmap (hashbrown 0.17)
    # simultaneously; the 0.15 → 0.17 API break prevents unification until
    # upstream realigns. Revisit on sqlx bumps.
    { crate = "hashbrown", reason = "transitive duplication via sqlx-core" },
    # `directories` (transitively via redox_users → dirs-sys) pulls
    # `getrandom 0.2`, while `rand 0.9 → rand_core` pulls `getrandom 0.3`.
    # Both upstreams have not yet realigned; the duplication is two thin
    # OS-randomness wrappers, not a security exposure. Revisit when
    # `directories` bumps its `dirs-sys` dep.
    { crate = "getrandom", reason = "transitive duplication: directories@6 still on getrandom 0.2, rand@0.9 on 0.3" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
